## This chart relies on the common library chart from bjw-s
## You can find it at https://github.com/bjw-s-labs/helm-charts/tree/common-5.0.1/charts/library/common
## Refer there for more detail about the supported values

# These entries are shared between all the Immich components

controllers:
  main:
    containers:
      main:
        image:
          tag: v2.6.3
        env:
          REDIS_HOSTNAME: '{{ printf "%s-valkey" .Release.Name }}'
          IMMICH_MACHINE_LEARNING_URL: '{{ printf "http://%s-machine-learning:3003" .Release.Name }}'
          # Add the env vars to connect to your database here.

immich:

  bootstrap:
    # Set to true to create the admin account on first install (Helm post-install hook)
    enabled: false

    # Container image for the bootstrap job
    # Pinned to a specific version for reproducibility — change tag to upgrade
    image:
      repository: curlimages/curl
      tag: "8.12.1"
      pullPolicy: IfNotPresent

    # Security context for the bootstrap container
    # curlimages/curl runs as UID 100 (curl_user) — no root needed
    securityContext:
      runAsNonRoot: true
      runAsUser: 100
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

    # Resource requests and limits for the bootstrap container
    resources: {}
    # resources:
    #   requests:
    #     cpu: 10m
    #     memory: 32Mi
    #   limits:
    #     memory: 64Mi

    # Number of retries before the Job is considered failed (Kubernetes default: 6)
    backoffLimit: 3

    # Admin credentials — used when bootstrapKind is not "Secret"
    adminEmail: ""
    adminName: "Immich Admin"
    defaultPassword: ""

    # Set to "Secret" to read admin credentials from an existing Kubernetes Secret.
    # Recommended for production to avoid storing passwords in values files.
    # Example Secret:
    #   kubectl create secret generic immich-admin \
    #     --from-literal=email=admin@example.com \
    #     --from-literal=name="Immich Admin" \
    #     --from-literal=password=changeme
    bootstrapKind: ""
    # Name of the existing Secret (required when bootstrapKind is "Secret")
    existingSecret: ""
    # Keys to read from the Secret
    existingSecretKeys:
      email: email
      name: name
      password: password

    # Override the Immich API URL used during bootstrap.
    # Defaults to the internal Kubernetes service: http://<release-name>-server:2283
    # Useful when the server is only reachable via an external URL or a proxy.
    # Example: http://my-proxy.svc.cluster.local:8080
    apiUrl: ""
    # Optional Host header added to every curl request.
    # Required when routing through a proxy that uses the Host header for routing.
    # Example: immich.example.com
    hostHeader: ""

  metrics:
    # Enabling this will create the service monitors needed to monitor immich with the prometheus operator
    enabled: false
  persistence:
    # Main data store for all photos shared between different components.
    library:
      # Automatically creating the library volume is not supported by this chart
      # You have to specify an existing PVC to use
      existingClaim:
  # configuration is immich-config.json converted to yaml. Ignored if existingConfiguration is set.
  # ref: https://immich.app/docs/install/config-file/
  #
  configuration: {}
    # trash:
    #   enabled: false
    #   days: 30
    # storageTemplate:
    #   enabled: true
    #   template: "{{y}}/{{y}}-{{MM}}-{{dd}}/{{filename}}"
  # Sets the resource Kind to store configuration in. Must be either ConfigMap or Secret.
  configurationKind: ConfigMap

  # Specify existing configuration resource name here to skip creation of a new one
  # existingConfiguration:

# Dependencies

valkey:
  enabled: false
  controllers:
    main:
      containers:
        main:
          image:
            repository: docker.io/valkey/valkey
            tag: 9.1-alpine@sha256:34f4f659e02a67cfdf3995d11ae432219c936005055b2cd39a042e86280e053e
            pullPolicy: IfNotPresent
  persistence:
    data:
      enabled: true
      size: 1Gi
      # Optional: Set this to persistentVolumeClaim to keep job queues persistent
      type: emptyDir
      accessMode: ReadWriteOnce
      # storageClass: your-class

# Immich components

server:
  enabled: true
  controllers:
    main:
      containers:
        main:
          image:
            repository: ghcr.io/immich-app/immich-server
            pullPolicy: IfNotPresent
  ingress:
    main:
      enabled: false
      annotations:
        # proxy-body-size is set to 0 to remove the body limit on file uploads
        nginx.ingress.kubernetes.io/proxy-body-size: "0"
      hosts:
        - host: immich.local
          paths:
            - path: "/"
              service:
                identifier: main
      tls: []

machine-learning:
  enabled: true
  controllers:
    main:
      containers:
        main:
          image:
            repository: ghcr.io/immich-app/immich-machine-learning
            pullPolicy: IfNotPresent
          env:
            TRANSFORMERS_CACHE: /cache
            HF_XET_CACHE: /cache/huggingface-xet
            MPLCONFIGDIR: /cache/matplotlib-config
  persistence:
    cache:
      enabled: true
      size: 10Gi
      # Optional: Set this to persistentVolumeClaim to avoid downloading the ML models every start.
      type: emptyDir
      accessMode: ReadWriteMany
      # storageClass: your-class
