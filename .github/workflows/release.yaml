name: release

on:
  push:
    branches:
      - main

jobs:
  release:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - uses: imjasonh/setup-crane@6da1ae018866400525525ce74ff892880c099987 # v0.5

      - name: configure git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: get latest release
        id: version
        run: |
          tag=$(curl -s https://api.github.com/repos/immich-app/immich-charts/releases/latest | jq '.tag_name' -r)
          chart_version=$(yq '.version' charts/immich/Chart.yaml)
          if [[ "$chart_version" != "${tag#immich-}" ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "chart_version=$chart_version" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate a token
        id: generate-token
        if: ${{ steps.version.outputs.should_release == 'true' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.PUSH_O_MATIC_APP_CLIENT_ID }}
          private-key: ${{ secrets.PUSH_O_MATIC_APP_KEY }}

      - name: run chart-releaser
        id: cr
        if: ${{ steps.version.outputs.should_release == 'true' }}
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        env:
          CR_TOKEN: ${{ steps.generate-token.outputs.token }}
          CR_GENERATE_RELEASE_NOTES: true
          CR_SKIP_EXISTING: true

      - name: Login to GitHub Container Registry
        if: ${{ steps.version.outputs.should_release == 'true' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - if: ${{ steps.version.outputs.should_release == 'true' }}
        name: Push Chart
        run: helm push .cr-release-packages/immich-*.tgz oci://ghcr.io/${{ github.repository }}

      - if: ${{ steps.version.outputs.should_release == 'true' }}
        id: artifact-digest
        name: Get artifact digest
        run: |
          DIGEST="$(crane digest ghcr.io/${{ github.repository }}:${{ steps.version.outputs.chart_version }})"
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - if: ${{ steps.version.outputs.should_release == 'true' }}
        name: Sign Chart
        run: cosign sign -y ghcr.io/${{ github.repository }}:${{ steps.version.outputs.chart_version }}@${{ steps.artifact-digest.outputs.digest }}
