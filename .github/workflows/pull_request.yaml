name: pull-request-validation

on:
  pull_request:

jobs:
  build_lint_validate_diff:
    name: lint, validate and diff from main
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - name: checkout pr head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Mise
        uses: immich-app/devtools/actions/use-mise@cf6e190bacde3d7bda59372a786b36ac7d01536a # use-mise-action-v2.0.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: install chart dependencies
        run: helm dependency build charts/immich

      - name: lint helm chart
        run: helm lint charts/immich --set immich.persistence.library.existingClaim=test-pvc --set valkey.enabled=true

      - name: checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: main
          path: main

      - name: install main chart dependencies
        run: helm dependency build main/charts/immich

      - name: compute diff
        id: diff
        run: |
          {
            echo 'diff<<EOF'
            helm diff local main/charts/immich charts/immich \
              --release immich \
              --no-color \
              --set immich.persistence.library.existingClaim=test-pvc \
              --set valkey.enabled=true
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: create diff comment
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: immich-app/devtools/actions/sticky-comment@0135acd12ad9f3369b94a2aa3c0ae8c835a4e926 # sticky-comment-action-v1.0.0
        with:
          id: diff-action
          body: |
            ## Changes in Final Manifest

            <details><summary>Manifest diff</summary>

            ```diff
            ${{ steps.diff.outputs.diff || 'No diff' }}
            ```

            </details>

  tilt_validation:
    name: Validate Tilt deployment and server startup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: token
        uses: immich-app/devtools/actions/create-workflow-token@caa599d954228439ea3e8ce1c3328f41ab120ee6 # create-workflow-token-action-v2.0.0
        with:
          client-id: ${{ secrets.PUSH_O_MATIC_APP_CLIENT_ID }}
          private-key: ${{ secrets.PUSH_O_MATIC_APP_KEY }}

      - name: Setup Mise
        uses: immich-app/devtools/actions/use-mise@7b8610a904d57da241e4ddba17fa62b62b15aed4 # use-mise-action-v2.0.2
        with:
          github_token: ${{ steps.token.outputs.token }}

      - name: Run Tilt CI validation
        run: mise run local:ci
